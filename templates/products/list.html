{% extends "base.html" %}

{% block content %}
<h2 class="text-xl font-semibold mb-6">Nasze perfumy</h2>
<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
    {% for product in products %}
    <div class="bg-white rounded-xl shadow p-4">
        {% if product.image %}
        <img src="{{ product.image.url }}" class="w-full h-48 object-cover rounded-lg mb-3">
        {% endif %}
        <h3 class="font-bold text-lg">{{ product.name }}</h3>
        <p class="text-gray-500 text-sm">{{ product.brand }}</p>
        <p class="text-purple-700 font-semibold mt-2">{{ product.price }} zł</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
