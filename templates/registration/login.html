{% extends "base.html" %}

{% block content %}
<section style="padding: 80px 0;">
    <div class="container" style="max-width: 400px;">
        <h1 style="font-size: 36px; font-weight: 300; margin-bottom: 40px; text-align: center;">Zaloguj się</h1>
        <div style="background: white; padding: 40px;">
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 13px; margin-bottom: 6px; color: #888;">{{ field.label }}</label>
                    {{ field }}
                </div>
                {% endfor %}
                <button type="submit" class="btn" style="width: 100%; padding: 14px;">Zaloguj</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
